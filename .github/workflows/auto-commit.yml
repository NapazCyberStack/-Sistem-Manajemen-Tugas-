name: Auto Commit Contribution

on:
  schedule:
    # Runs at 12:00 UTC (19:00 WIB / 7:00 PM WIB) every day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Update contribution file
      run: |
        echo "Last automated contribution: $(date)" > last-contribution.txt

    - name: Commit and push changes
      run: |
        git config --global user.name "kurniananda772"
        git config --global user.email "kurniananda772@gmail.com"
        git add last-contribution.txt
        # Commit only if there are changes
        git diff-index --quiet HEAD || git commit -m "chore: automated contribution update [skip ci]"
        git push
